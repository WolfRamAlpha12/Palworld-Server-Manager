name: Build and release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  IMAGE_NAME: palworld-server-manager

jobs:
  version:
    name: Bump patch version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Compute next version and push tag
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --tags --force

          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)"
          if [[ -n "${latest}" ]]; then
            current="${latest#v}"
            echo "Latest git tag: ${latest}"
          else
            current="$(node -p "require('./package.json').version")"
            echo "No v* tags found; treating package.json ${current} as already released"
          fi

          if [[ ! "${current}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing to bump non-semver version: ${current}" >&2
            exit 1
          fi

          version="$(printf '%s' "${current}" | awk -F. '{printf "%d.%d.%d", $1, $2, $3+1}')"
          tag="v${version}"

          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists" >&2
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "refs/tags/${tag}"

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "Released ${tag}"

  docker:
    name: Build and push manager image
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.version.outputs.version }}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  agent:
    name: Bundle host agent
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle agent
        env:
          PSM_AGENT_VERSION: ${{ needs.version.outputs.version }}
        run: pnpm --filter @psm/agent build:bundle

      - name: Stage release assets
        run: |
          mkdir -p dist-agent
          cp apps/agent/dist/agent.mjs dist-agent/agent.mjs
          cp deploy/agent/install.sh dist-agent/install.sh
          cp deploy/systemd/palworld-agent.service dist-agent/palworld-agent.service
          chmod +x dist-agent/agent.mjs dist-agent/install.sh
          (
            cd dist-agent
            sha256sum agent.mjs install.sh palworld-agent.service > SHA256SUMS
          )

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: psm-agent-${{ needs.version.outputs.version }}
          path: dist-agent/
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ needs.version.outputs.tag }}"
          version="${{ needs.version.outputs.version }}"
          notes="$(printf '%s\n' \
            "### Manager image" \
            "\`docker pull ${{ secrets.DOCKERHUB_USERNAME }}/palworld-server-manager:${version}\`" \
            "" \
            "### Host agent" \
            "\`\`\`bash" \
            "curl -fsSL https://github.com/${{ github.repository }}/releases/download/${tag}/install.sh | sudo bash" \
            "\`\`\`")"
          gh release create "${tag}" \
            --title "${tag}" \
            --notes "${notes}" \
            --target "${{ github.sha }}" \
            dist-agent/agent.mjs \
            dist-agent/install.sh \
            dist-agent/palworld-agent.service \
            dist-agent/SHA256SUMS
